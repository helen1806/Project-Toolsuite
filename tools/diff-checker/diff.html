<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Code Diff Checker</title>
    <meta property="og:title" content="Visual Code Diff Checker - Project Toolsuite" />

    <meta
    property="og:description"
    content="Compare text and code differences instantly with a fast browser-based visual diff checker."
    />

    <meta
    property="og:image"
    content="https://cdn-icons-png.flaticon.com/512/3522/3522262.png"
    />

    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta
    name="twitter:title"
    content="Visual Code Diff Checker - Project Toolsuite"
    />

    <meta
    name="twitter:description"
    content="Compare text and code differences instantly with a fast browser-based visual diff checker."
    />
    <style>

        :root {
            --bg-color: var(--bg);
            --panel-bg: var(--tag-bg);
            --text-color: var(--text);
            --border-color: var(--border);

            --diff-add-bg: var(--tag-bg);
            --diff-add-text: var(--text);

            --diff-del-bg: var(--tag-bg);
            --diff-del-text: var(--text);

            --line-num-color: var(--muted);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h1 { margin: 0; font-size: 1.5rem; }

        .input-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: 40%;
            min-height: 200px;
            margin-bottom: 20px;
        }

        .input-box {
            display: flex;
            flex-direction: column;
        }

        label { margin-bottom: 5px; font-weight: bold; color: var(--muted); }

        textarea {
            flex-grow: 1;
            background-color: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            resize: none;
        }
        textarea:focus {  outline: 1px solid var(--border); }

        /* Controls */
        .controls {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            background-color: var(--bg);
            color: var(--text);
            border: 2px solid var(--border);
            padding: 8px 20px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: var(--text);
            color: var(--bg);
            opacity: 0.9;
        }
        button.secondary { background-color: var(--bg); color: var(--text); margin-right: 150px;}

        /* Output Area */
        .diff-output {
            flex-grow: 1;
            background-color: var(--bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.5;
        }

        .diff-line {
            display: flex;
            width: 100%;
        }

        .line-num {
            width: 50px;
            text-align: right;
            padding-right: 10px;
            color: var(--line-num-color);
            user-select: none;
            border-right: 1px solid var(--border);
            background-color: var(--tag-bg);
        }

        .line-content {
            padding-left: 10px;
            white-space: pre-wrap;
            word-break: break-all;
            flex-grow: 1;
        }

        /* Colors */
        .diff-added { background-color: var(--diff-add-bg); color: var(--diff-add-text); }
        .diff-removed { background-color: var(--diff-del-bg); color: var(--diff-del-text); text-decoration: line-through; opacity: 0.8; }
        .diff-header { background-color: var(--tag-bg); color: var(--muted); padding: 5px; font-style: italic; }

        a {
            color: var(--text);
            text-decoration: none;
            border-bottom: 1px dotted var(--border);
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        a:hover {
            background-color: var(--text);
            color: var(--bg);
        }

    
    </style>
    <link rel="stylesheet" href="../../theme.css">
    <script src="../../theme.js"></script>
</head>
<body>

    <header>
        <h1>Visual Diff Checker</h1>
        <button class="secondary" onclick="clearAll()">Clear All</button>
    
        <button class="dark-mode-toggle" onclick="toggleTheme()" id="themeBtn">DARK MODE</button></header>

    <div class="input-container">
        <div class="input-box">
            <label>Original Text</label>
            <textarea id="original" placeholder="Paste original code/text here..."></textarea>
        </div>
        <div class="input-box">
            <label>Modified Text</label>
            <textarea id="modified" placeholder="Paste modified code/text here..."></textarea>
        </div>
    </div>

    <div class="controls">
        <button onclick="compareText()">🔍 Compare Differences</button>
    </div>

    <div class="diff-output" id="output">
        <div style="padding: 20px; color: var(--muted); text-align: center;">Result will appear here...</div>
    </div>
    <footer>
        <a href="../../index.html">&larr; Back to Home</a>
    </footer>
    <script src="diff-logic.js"></script>
</body>
</html>
